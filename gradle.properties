# Build speed defaults.
# Build cache: task outputs are reused across builds (and branches) when inputs match.
org.gradle.caching=true
# Configuration cache: skips the configuration phase on repeat builds. If a plugin in
# this project is incompatible (build fails with configuration-cache errors), remove
# this line — keep the other two.
org.gradle.configuration-cache=true
# Parallel project execution (matters for multi-module builds).
org.gradle.parallel=true
